name: Python syntax check

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile scripts
        run: |
          python -m py_compile fit_memristor_pso.py
          python -m py_compile analyze_frequency_sweep.py
          python -m py_compile analyze_voltage_sweep.py
